<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        // BLOQUEO RADICAL: Si no hay sesión, ni siquiera dejamos que cargue el resto
        if (!localStorage.getItem('user_id')) {
            alert("Acceso denegado. Debes iniciar sesión para vender.");
            window.location.href = "../logins/Login.html";
        }
    </script>
    <title>Vender - Mi Tienda</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- TU ENLACE CSS DE BOOTSTRAP (Versión 5.3.0) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="bg-light">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="Tienda.html">TIENDA</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="Tienda.html">Inicio</a>
                <a class="nav-link active" href="Venta.html">Vender</a>
            </div>
        </div>
    </nav>

    <!-- FORMULARIO DE VENTA -->
    <div class="container">
        <div class="form-container">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white py-3">
                    <h5 class="mb-0 text-center">Publicar nuevo producto</h5>
                </div>
                <div class="card-body p-4">
                    <form id="formulario-venta">
                        <!-- NOMBRE -->
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Nombre del mueble</label>
                            <input type="text" id="nombre-mueble" class="form-control" placeholder="Ej: Armario antiguo" required>
                        </div>
                    
                        <!-- PRECIO -->
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Precio</label>
                            <div class="input-group">
                                <input type="number" id="precio-mueble" class="form-control" step="0.01" placeholder="0.00" required>
                                <span class="input-group-text">€</span>
                            </div>
                        </div>
                    
                        <!-- DESCRIPCIÓN CORTA -->
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Resumen corto (para la tarjeta)</label>
                            <input type="text" id="desc-corta" class="form-control" placeholder="Breve resumen..." required maxlength="100">
                        </div>
                    
                        <!-- DETALLES LARGOS -->
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Detalles extendidos (historia, medidas...)</label>
                            <textarea id="desc-larga" class="form-control" rows="4" placeholder="Cuéntanos más sobre el mueble..."></textarea>
                        </div>
                    
                        <!-- IMAGEN -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Seleccionar Foto del Mueble</label>
                            <!-- CAMBIADO: De type="text" a type="file" -->
                            <input type="file" id="archivo-imagen" class="form-control" accept="image/*" required>
                        </div>
                    
                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark btn-lg fw-bold">Publicar Producto</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <a href="Tienda.html" class="text-muted small text-decoration-none">← Volver a la tienda</a>
            </div>
        </div>
    </div>

    <!-- TU ENLACE JS DE BOOTSTRAP (Versión 5.3.8) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <!-- LÓGICA DE SUBIDA -->
    <script>
        document.getElementById('formulario-venta').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const archivoInput = document.getElementById('archivo-imagen');
    const file = archivoInput.files[0]; // Cogemos el archivo seleccionado
    
    if (!file) return alert("Selecciona una foto");

    const reader = new FileReader();
    
    // Al terminar de leer el archivo...
    reader.onloadend = async function() {
        const datos = {
            nombre: document.getElementById('nombre-mueble').value,
            precio: document.getElementById('precio-mueble').value,
            descripcion: document.getElementById('desc-corta').value,
            detalles: document.getElementById('desc-larga').value,
            imagen: reader.result, // Aquí va el Base64 (data:image/...)
            vendedor_id: localStorage.getItem('user_id')
        };

        const res = await fetch('http://localhost:5000/productos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        });

        if (res.ok) {
            alert("¡Producto publicado!");
            window.location.href = "Tienda.html";
        }
    };

    reader.readAsDataURL(file); // Ejecuta la lectura
});
    </script>
</body>
</html>
