<!DOCTYPE html>
<html lang="es">
<head>
    <title>Mi Tienda Online</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- TU ENLACE CSS DE BOOTSTRAP (Versión 5.3.0) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Mantiene las imágenes uniformes sin deformarlas */
        .card-img-top {
            height: 250px;
            object-fit: cover;
            background-color: #f8f9fa;
        }
        /* Efecto de elevación al pasar el ratón */
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
    </style>
</head>
<body class="bg-light">

    <!-- BARRA DE NAVEGACIÓN DINÁMICA -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="Tienda.html">TIENDA</a>
            <div class="navbar-nav ms-auto" id="menu-navegacion-principal">
                <a class="nav-link active" href="Tienda.html">Inicio</a>
                <a class="nav-link" href="Venta.html">Vender</a>
                <!-- El script de abajo inyectará aquí Login o Mis Productos -->
            </div>
        </div>
    </nav>

    <!-- CABECERA -->
    <header class="container text-center mb-5">
        <h1 class="display-4 fw-bold">Catálogo de Muebles</h1>
        <p class="lead text-muted">Piezas únicas con historia para tu hogar.</p>
    </header>

    <!-- CONTENEDOR DE PRODUCTOS -->
    <div class="container pb-5">
        <div id="contenedor-productos" class="row row-cols-1 row-cols-md-3 g-4">
            <!-- Se rellena automáticamente mediante productos.js -->
        </div>
    </div>

    <!-- TU ENLACE JS DE BOOTSTRAP (Versión 5.3.8) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


    <!-- CARGA DE TU ARCHIVO JS EXTERNO (productos.js) -->
    <script src="productos.js"></script>

    <!-- LÓGICA DEL MENÚ DINÁMICO -->
    <script>
        (function() {
            const menu = document.getElementById('menu-navegacion-principal');
            const logueadoId = localStorage.getItem('user_id');
            const logueadoNombre = localStorage.getItem('username');

            if (logueadoId && menu) {
                // SI HAY SESIÓN: Añadimos Mis Productos y Cerrar Sesión
                menu.innerHTML += `
                    <a class="nav-link text-info fw-bold" href="../logins/MisProductos.html">Mis Productos</a>
                    <a class="nav-link" href="#" id="logout-btn">Salir (${logueadoNombre})</a>
                `;
                
                document.getElementById('logout-btn').onclick = function(e) {
                    e.preventDefault();
                    localStorage.clear();
                    window.location.reload();
                };
            } else if (menu) {
                // SI NO HAY SESIÓN: Botón de Iniciar Sesión
                menu.innerHTML += `
                    <a class="nav-link" href="../logins/Login.html">Iniciar Sesión</a>
                `;
            }
        })();
    </script>
</body>
</html>
