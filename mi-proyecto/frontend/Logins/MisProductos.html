<!DOCTYPE html>
<html lang="es">
<head>
    <title>Panel de Vendedor - Mi Tienda</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- TU ENLACE CSS DE BOOTSTRAP (Versión 5.3.0) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .header-perfil { background: linear-gradient(45deg, #212529, #495057); color: white; padding: 60px 0; }
        .card { border: none; border-radius: 12px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-img-top { height: 180px; object-fit: cover; border-top-left-radius: 12px; border-top-right-radius: 12px; }
    </style>
</head>
<body class="bg-light">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../tienda/Tienda.html">TIENDA</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../tienda/Tienda.html">Inicio</a>
                <a class="nav-link active" href="#">Mis Productos</a>
                <a class="nav-link" href="../tienda/Venta.html">Vender más</a>
            </div>
        </div>
    </nav>

    <!-- CABECERA -->
    <header class="header-perfil shadow-sm mb-5">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">Mis Ventas</h1>
            <p class="lead text-white-50">Gestiona los productos que has publicado en la tienda.</p>
        </div>
    </header>

    <div class="container pb-5">
        <!-- CONTENEDOR PARA EL JS -->
        <div id="lista-mis-productos" class="row row-cols-1 row-cols-md-3 g-4">
            <!-- El JS inyectará las tarjetas aquí -->
        </div>

        <!-- MENSAJE DE ESTADO VACÍO -->
        <div id="mensaje-vacio" class="text-center py-5 d-none">
            <div class="card p-5 shadow-sm border-0 mx-auto" style="max-width: 500px;">
                <h3 class="text-muted">No tienes muebles a la venta</h3>
                <p>¿Quieres ganar dinero con tus muebles antiguos?</p>
                <a href="../tienda/Venta.html" class="btn btn-dark btn-lg mt-3 px-5">Publicar mi primer anuncio</a>
            </div>
        </div>
    </div>

    <!-- TU ENLACE JS DE BOOTSTRAP (Versión 5.3.8) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>


    <!-- COMPROBACIÓN DE SESIÓN + CARGA DE DATOS -->
    <script src="mis-productos.js"></script>
    <script>
        // Segundo nivel de seguridad: si no hay sesión, fuera.
        if (!localStorage.getItem('user_id')) {
            window.location.href = "Login.html";
        }
    </script>
</body>
</html>
